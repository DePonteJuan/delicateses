<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Reposter�a artesanal">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF5F7"/>
      <stop offset="35%" stop-color="#FFE8EE"/>
      <stop offset="68%" stop-color="#F7D6DE"/>
      <stop offset="100%" stop-color="#E8F0E1"/>
    </linearGradient>
    <radialGradient id="bloom" cx="78%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cakeBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8F5"/>
      <stop offset="100%" stop-color="#F7D6DE"/>
    </linearGradient>
    <linearGradient id="glaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C94B6A"/>
      <stop offset="100%" stop-color="#E891A2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect width="1600" height="1000" fill="url(#bloom)"/>

  <ellipse cx="180" cy="160" rx="200" ry="110" fill="#FFF5F7" opacity="0.18" filter="url(#soft)"/>
  <ellipse cx="1450" cy="120" rx="220" ry="120" fill="#FFFFFF" opacity="0.2" filter="url(#soft)"/>
  <ellipse cx="250" cy="820" rx="280" ry="140" fill="#C5D4B8" opacity="0.22" filter="url(#soft)"/>

  <!-- cake -->
  <ellipse cx="1180" cy="700" rx="300" ry="70" fill="#2C1810" opacity="0.22"/>
  <rect x="960" y="380" width="440" height="320" rx="40" fill="url(#cakeBody)"/>
  <path d="M960 450 C1100 360 1280 360 1400 450 L1400 380 C1280 300 1100 300 960 380 Z" fill="url(#glaze)"/>
  <rect x="1000" y="510" width="360" height="16" rx="8" fill="#E07A8A" opacity="0.35"/>
  <rect x="1000" y="560" width="360" height="16" rx="8" fill="#E07A8A" opacity="0.22"/>
  <rect x="1000" y="610" width="360" height="16" rx="8" fill="#C5D4B8" opacity="0.35"/>

  <!-- frosting peaks -->
  <circle cx="1060" cy="350" r="22" fill="#FFF5F7"/>
  <circle cx="1140" cy="330" r="28" fill="#FFE8EE"/>
  <circle cx="1230" cy="325" r="30" fill="#FFF5F7"/>
  <circle cx="1320" cy="345" r="24" fill="#FFE8EE"/>

  <!-- cookies cluster -->
  <circle cx="320" cy="680" r="86" fill="#F5E0C8"/>
  <circle cx="470" cy="710" r="74" fill="#E8C9A8"/>
  <circle cx="220" cy="740" r="62" fill="#FFE8EE"/>
  <circle cx="300" cy="655" r="9" fill="#C94B6A" opacity="0.55"/>
  <circle cx="450" cy="690" r="8" fill="#A33854" opacity="0.45"/>
  <circle cx="210" cy="720" r="7" fill="#C94B6A" opacity="0.4"/>

  <!-- soft sparkles -->
  <circle cx="700" cy="220" r="4" fill="#FFF5F7" opacity="0.7"/>
  <circle cx="760" cy="280" r="3" fill="#FFF5F7" opacity="0.55"/>
  <circle cx="840" cy="190" r="3.5" fill="#FFF5F7" opacity="0.65"/>
</svg>
